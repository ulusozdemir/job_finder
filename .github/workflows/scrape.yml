name: Job Finder Pipeline

on:
  schedule:
    # Runs every 6 hours (4 times/day)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  find-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous DB
        uses: dawidd6/action-download-artifact@v6
        with:
          name: jobs-db
          path: .
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Reset a few jobs for testing
        run: |
          python -c "
          from src.db.database import init_db, get_session
          from src.db.models import Job
          init_db()
          s = get_session()
          jobs = s.query(Job).filter(Job.match_score >= 60).limit(5).all()
          for j in jobs:
              j.notified = False
              j.match_score = None
              j.match_reasons = None
              j.missing_skills = None
              j.rejection_reason = None
              j.passed_prefilter = True
          s.commit()
          print(f'Reset {len(jobs)} jobs for re-scoring')
          s.close()
          "

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: jobs.db
          retention-days: 90
          overwrite: true
