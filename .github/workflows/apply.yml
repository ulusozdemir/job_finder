name: Auto Apply Runner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      reset_jobs:
        description: "Number of applied/failed jobs to reset back to approved (0 = none)"
        required: false
        default: "0"

jobs:
  auto-apply:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Setup venv and install dependencies
        run: |
          if (-not (Test-Path "venv")) { python -m venv venv }
          venv\Scripts\Activate.ps1
          $hash = (Get-FileHash requirements.txt -Algorithm MD5).Hash
          $marker = "venv\.deps_$hash"
          if (-not (Test-Path $marker)) {
            python -m pip install -q -r requirements.txt
            python -m playwright install chromium
            New-Item -Path $marker -ItemType File -Force | Out-Null
          } else {
            Write-Host "Dependencies already up to date, skipping install"
          }

      - name: Copy and clean LinkedIn session if available
        run: |
          $src = "C:\Users\Berke\Desktop\job_finder\linkedin_session.json"
          if (Test-Path $src) {
            Copy-Item $src -Destination "linkedin_session.json" -Force
            venv\Scripts\Activate.ps1
            python -c "import json; p='linkedin_session.json'; d=json.loads(open(p,encoding='utf-8').read()); [c.pop('partitionKey',None) or c.pop('_crHasCrossSiteAncestor',None) for c in d.get('cookies',[])]; open(p,'w',encoding='utf-8').write(json.dumps(d))"
            Write-Host "LinkedIn session loaded and cleaned"
          } else {
            Write-Host "No saved session found - login will be required"
          }

      - name: Backup local DB apply statuses
        run: |
          if (Test-Path "jobs.db") {
            venv\Scripts\Activate.ps1
            python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); rows = s.query(Job.job_id, Job.apply_status, Job.applied_at).filter(Job.apply_status != 'not_applied').all(); import json; open('_apply_backup.json','w').write(json.dumps([{'jid':r[0],'st':r[1],'at':str(r[2]) if r[2] else None} for r in rows])); print(f'Backed up {len(rows)} apply statuses'); s.close()"
          } else {
            Write-Host "No local DB yet"
          }

      - name: Download latest DB from scrape
        uses: dawidd6/action-download-artifact@v6
        with:
          name: jobs-db
          path: .
          search_artifacts: true
          if_no_artifact_found: warn
          workflow: scrape.yml

      - name: Restore apply statuses into downloaded DB
        run: |
          venv\Scripts\Activate.ps1
          python -c "import json, os; from datetime import datetime; from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); f='_apply_backup.json'; rows = json.loads(open(f).read()) if os.path.exists(f) else []; [setattr(j, 'apply_status', r['st']) or (setattr(j, 'applied_at', datetime.fromisoformat(r['at'])) if r['at'] and r['at']!='None' else None) for r in rows if (j := s.query(Job).filter(Job.job_id == r['jid']).first())]; s.commit(); print(f'Restored {len(rows)} apply statuses'); s.close()"

      - name: Verify DB exists
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.database import init_db, get_session; from src.db.models import Job; from sqlalchemy import func; init_db(); s = get_session(); print(f'Jobs in DB: {s.query(Job).count()}'); [print(f'  {st}: {cnt}') for st, cnt in s.query(Job.apply_status, func.count()).group_by(Job.apply_status).all()]; s.close()"

      - name: Reset jobs for testing
        if: ${{ github.event.inputs.reset_jobs != '0' && github.event.inputs.reset_jobs != '' }}
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); n = min(int('${{ github.event.inputs.reset_jobs }}'), 5); jobs = s.query(Job).filter(Job.apply_status.in_(['applied', 'failed', 'captcha'])).limit(n).all(); [print(f'Reset: {j.title} @ {j.company} ({j.apply_status} -> approved)') or setattr(j, 'apply_status', 'approved') or setattr(j, 'applied_at', None) for j in jobs]; s.commit(); print(f'Total reset: {len(jobs)}'); s.close()"

      - name: Run auto-apply
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PHONE: ${{ secrets.APPLICANT_PHONE }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          HEADLESS: "true"
          PYTHONIOENCODING: "utf-8"
        run: |
          venv\Scripts\Activate.ps1
          python -m src.applicant.runner

      - name: Upload DB artifact
        if: always() && hashFiles('jobs.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: jobs.db
          retention-days: 90
          overwrite: true
